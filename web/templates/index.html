<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚂 Stations Pathfinder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 0;
            min-height: 80vh;
        }

        .sidebar {
            background: #f8f9fa;
            padding: 30px;
            border-right: 1px solid #e0e0e0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .visualization {
            padding: 30px;
            position: relative;
        }

        #canvas {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
            cursor: grab;
        }

        #canvas:active {
            cursor: grabbing;
        }

        .info-panel {
            margin-top: 20px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-panel h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .log-entry {
            padding: 8px 12px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3a3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3a3;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .controls button {
            flex: 1;
            padding: 10px;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚂 Stations Pathfinder</h1>
            <p class="subtitle">Interactive Train Route Visualization</p>
        </header>

        <div class="content">
            <div class="sidebar">
                <div class="form-group">
                    <label for="mapSelect">Select Network Map</label>
                    <select id="mapSelect">
                        <option value="">Loading maps...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="startStation">Start Station</label>
                    <input type="text" id="startStation" placeholder="e.g., waterloo">
                </div>

                <div class="form-group">
                    <label for="endStation">End Station</label>
                    <input type="text" id="endStation" placeholder="e.g., st_pancras">
                </div>

                <div class="form-group">
                    <label for="numTrains">Number of Trains</label>
                    <input type="number" id="numTrains" min="1" max="1000" value="4">
                </div>

                <button id="runButton" onclick="runPathfinder()">
                    🚀 Run Pathfinder
                </button>

                <div id="message"></div>
            </div>

            <div class="visualization">
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #4CAF50;"></div>
                        <span>Start Station</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #f44336;"></div>
                        <span>End Station</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #2196F3;"></div>
                        <span>Path</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #FF9800; border-radius: 50%;"></div>
                        <span>Train</span>
                    </div>
                </div>

                <canvas id="canvas" width="900" height="600"></canvas>

                <div id="stats" style="display: none;">
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value" id="pathCount">0</div>
                            <div class="stat-label">Paths Found</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="turnCount">0</div>
                            <div class="stat-label">Total Turns</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="trainCount">0</div>
                            <div class="stat-label">Trains</div>
                        </div>
                    </div>

                    <div class="controls">
                        <button onclick="startAnimation()">▶️ Play</button>
                        <button onclick="pauseAnimation()">⏸️ Pause</button>
                        <button onclick="resetAnimation()">🔄 Reset</button>
                    </div>
                </div>

                <div id="log" class="info-panel" style="display: none;">
                    <h3>Movement Log</h3>
                    <div id="logEntries"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
