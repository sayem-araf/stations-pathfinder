<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder - Train Network Visualizer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h1 style="margin-bottom: 20px; color: var(--accent);">Pathfinder</h1>
            
            <div class="control-group">
                <label for="mapSelect">Network Map</label>
                <select id="mapSelect">
                    <option value="">Loading maps...</option>
                </select>
            </div>

            <div class="control-group">
                <label for="numTrains">Number of Trains</label>
                <input type="number" id="numTrains" min="1" max="1000" value="4">
            </div>

            <button class="primary-btn" onclick="runPathfinder()">
                Run Pathfinder
            </button>

            <div id="message" style="margin-top: 10px; padding: 10px; border-radius: 4px;"></div>

            <div id="stats" style="margin-top: 20px; display: none;">
                <h3 style="color: var(--accent); margin-bottom: 10px;">Statistics</h3>
                <div id="statsContent"></div>
            </div>

            <div id="controls" style="margin-top: 20px; display: none;">
                <h3 style="color: var(--accent); margin-bottom: 10px;">Progress</h3>
                <div id="turnInfo" style="text-align: center; font-size: 16px; padding: 10px;"></div>
            </div>

            <div id="movementLog" style="margin-top: 20px; display: none; max-height: 400px; overflow-y: auto;">
                <h3 style="color: var(--accent); margin-bottom: 10px;">Movement Log</h3>
                <div id="logContent" style="font-size: 12px; font-family: monospace;"></div>
            </div>
        </div>

        <div class="viewport">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
